{% extends "base.html" %}
{% block title %}Создать резюме — WorkBridge{% endblock %}
{% block page_title %}Конструктор резюме{% endblock %}
{% block content %}
<div class="max-w-3xl" x-data="{
    experience: [],
    education: [],
    addExperience() { this.experience.push({position:'',company:'',start:'',end:'',description:''}) },
    removeExperience(i) { this.experience.splice(i,1) },
    addEducation() { this.education.push({institution:'',degree:'',field:'',start:'',end:''}) },
    removeEducation(i) { this.education.splice(i,1) }
}">
    <div class="bg-white rounded-xl p-6 card-shadow">
        <form method="POST" action="/resume/create" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Название резюме</label>
                <input type="text" name="title" value="Резюме" class="input-field">
            </div>
            <hr>
            <h3 class="font-semibold text-gray-800">Личные данные</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ФИО</label>
                    <input type="text" name="full_name" value="{{ user.full_name }}" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" value="{{ user.email }}" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Телефон</label>
                    <input type="text" name="phone" class="input-field" placeholder="+7 (___) ___-__-__">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Город</label>
                    <input type="text" name="city" class="input-field">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">О себе</label>
                <textarea name="bio" rows="3" class="input-field"></textarea>
            </div>
            <hr>
            <div class="flex items-center justify-between">
                <h3 class="font-semibold text-gray-800">Опыт работы</h3>
                <button type="button" @click="addExperience()" class="btn-secondary text-sm">+ Добавить</button>
            </div>
            <template x-for="(exp, i) in experience" :key="i">
                <div class="border border-gray-200 rounded-lg p-4 space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium text-gray-500" x-text="'Место работы #' + (i+1)"></span>
                        <button type="button" @click="removeExperience(i)" class="text-red-500 text-sm">Удалить</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" x-model="exp.position" placeholder="Должность" class="input-field">
                        <input type="text" x-model="exp.company" placeholder="Компания" class="input-field">
                        <input type="text" x-model="exp.start" placeholder="Начало (2020)" class="input-field">
                        <input type="text" x-model="exp.end" placeholder="Окончание (2023)" class="input-field">
                    </div>
                    <textarea x-model="exp.description" placeholder="Описание" rows="2" class="input-field"></textarea>
                </div>
            </template>
            <hr>
            <div class="flex items-center justify-between">
                <h3 class="font-semibold text-gray-800">Образование</h3>
                <button type="button" @click="addEducation()" class="btn-secondary text-sm">+ Добавить</button>
            </div>
            <template x-for="(edu, i) in education" :key="i">
                <div class="border border-gray-200 rounded-lg p-4 space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium text-gray-500" x-text="'Образование #' + (i+1)"></span>
                        <button type="button" @click="removeEducation(i)" class="text-red-500 text-sm">Удалить</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" x-model="edu.institution" placeholder="Учебное заведение" class="input-field">
                        <input type="text" x-model="edu.degree" placeholder="Степень" class="input-field">
                        <input type="text" x-model="edu.field" placeholder="Специальность" class="input-field">
                        <div class="flex gap-2">
                            <input type="text" x-model="edu.start" placeholder="Начало" class="input-field">
                            <input type="text" x-model="edu.end" placeholder="Конец" class="input-field">
                        </div>
                    </div>
                </div>
            </template>
            <hr>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Навыки</label>
                <textarea name="skills" rows="2" class="input-field" placeholder="Python, SQL, управление проектами..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Языки</label>
                <textarea name="languages" rows="2" class="input-field" placeholder="Русский — родной, Английский — B2, Казахский — свободно"></textarea>
            </div>
            <input type="hidden" name="experience_json" :value="JSON.stringify(experience)">
            <input type="hidden" name="education_json" :value="JSON.stringify(education)">
            <button type="submit" class="btn-primary">Создать резюме</button>
        </form>
    </div>
</div>
{% endblock %}
