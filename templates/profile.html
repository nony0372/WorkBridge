{% extends "base.html" %}
{% block title %}Профиль — WorkBridge{% endblock %}
{% block page_title %}Мой профиль{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-xl p-6 card-shadow">
        <form method="POST" action="/profile" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Полное имя</label>
                <input type="text" name="full_name" value="{{ user.full_name }}" class="input-field">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Навыки</label>
                <textarea name="skills" rows="3" class="input-field" placeholder="Python, JavaScript, SQL...">{{ profile.skills if profile else '' }}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Опыт (лет)</label>
                    <input type="number" name="experience_years" value="{{ profile.experience_years if profile else 0 }}" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Желаемая зарплата</label>
                    <input type="number" name="desired_salary" value="{{ profile.desired_salary if profile else 0 }}" class="input-field">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Город</label>
                <input type="text" name="city" value="{{ profile.city if profile else '' }}" class="input-field">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">О себе</label>
                <textarea name="bio" rows="4" class="input-field">{{ profile.bio if profile else '' }}</textarea>
            </div>
            <button type="submit" class="btn-primary">Сохранить</button>
        </form>
    </div>
</div>
{% endblock %}
