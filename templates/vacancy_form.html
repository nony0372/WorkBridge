{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if vacancy else 'Создать' }} вакансию — WorkBridge{% endblock %}
{% block page_title %}{{ 'Редактировать' if vacancy else 'Создать' }} вакансию{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-xl p-6 card-shadow">
        <form method="POST" action="{{ '/vacancies/' ~ vacancy.id ~ '/edit' if vacancy else '/vacancies/create' }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Название</label>
                <input type="text" name="title" required value="{{ vacancy.title if vacancy else '' }}" class="input-field">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
                <textarea name="description" rows="5" class="input-field">{{ vacancy.description if vacancy else '' }}</textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Требования</label>
                <textarea name="requirements" rows="4" class="input-field">{{ vacancy.requirements if vacancy else '' }}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Зарплата от</label>
                    <input type="number" name="salary_min" value="{{ vacancy.salary_min if vacancy else '' }}" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Зарплата до</label>
                    <input type="number" name="salary_max" value="{{ vacancy.salary_max if vacancy else '' }}" class="input-field">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Город</label>
                    <input type="text" name="city" value="{{ vacancy.city if vacancy else '' }}" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Тип занятости</label>
                    <select name="employment_type" class="input-field">
                        <option value="full-time" {{ 'selected' if vacancy and vacancy.employment_type == 'full-time' }}>Полная</option>
                        <option value="part-time" {{ 'selected' if vacancy and vacancy.employment_type == 'part-time' }}>Частичная</option>
                        <option value="remote" {{ 'selected' if vacancy and vacancy.employment_type == 'remote' }}>Удалённая</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Отрасль</label>
                <input type="text" name="industry" value="{{ vacancy.industry if vacancy else '' }}" class="input-field">
            </div>
            <button type="submit" class="btn-primary">{{ 'Сохранить' if vacancy else 'Создать' }}</button>
        </form>
    </div>
</div>
{% endblock %}
